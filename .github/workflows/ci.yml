name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      - name: Build frontend
        working-directory: web
        run: npm run build
      - name: Install uv
        run: python -m pip install uv
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e '.[dev]'
      - name: Static analysis
        run: |
          ruff check src tests tools
          mypy src/tars_revoke
      - name: Python tests
        # sandbox-exec is deprecated and non-functional on GitHub macOS runners
        # (hardened runtime). These 3 tests pass on a real dev Mac.
        run: >-
          pytest
          --deselect tests/unit/test_experiment_sandbox.py::test_allow_only_sandbox_runs_the_bound_python
          --deselect tests/integration/test_canonical_demo.py::test_canonical_demo_proves_selective_revoke_repair_and_resume
          --deselect tests/integration/test_canonical_demo.py::test_portable_and_release_receipts_require_distinct_exact_durable_rows
      - name: Frontend tests and build
        working-directory: web
        run: |
          npm test
          npm run build
          npm audit --audit-level=high
      - name: Dependency audit
        run: pip-audit
      - name: Build and inspect release archives
        run: |
          python -m build
          python tools/check_release_archives.py
